<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Enigma Machine</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>

 <div class="scene">

  <div class="machine">
   <div class="panel">

   <!-- Serial number badge -->
   <div class="nameplate">
    <div class="nameplate-badge">Enigma &nbsp; I</div>
   </div>

   <!-- Rotor section -->
   <div class="rotor-section">
    <div class="rotor">
     <button class="rotor-btn up" data-rotor="0">&#9650;</button>
     <div class="rotor-housing">
      <div class="rotor-window" id="rotor-0">A</div>
     </div>
     <button class="rotor-btn down" data-rotor="0">&#9660;</button>
     <div class="rotor-label">Left</div>
     <div class="ring-section">
      <div class="ring-label">Ring</div>
      <div class="ring-controls">
       <button class="ring-btn" data-rotor="0" data-dir="-1">&#8722;</button>
       <div class="ring-display" id="ring-0">A</div>
       <button class="ring-btn" data-rotor="0" data-dir="1">+</button>
      </div>
     </div>
    </div>
    <div class="rotor">
     <button class="rotor-btn up" data-rotor="1">&#9650;</button>
     <div class="rotor-housing">
      <div class="rotor-window" id="rotor-1">A</div>
     </div>
     <button class="rotor-btn down" data-rotor="1">&#9660;</button>
     <div class="rotor-label">Middle</div>
     <div class="ring-section">
      <div class="ring-label">Ring</div>
      <div class="ring-controls">
       <button class="ring-btn" data-rotor="1" data-dir="-1">&#8722;</button>
       <div class="ring-display" id="ring-1">A</div>
       <button class="ring-btn" data-rotor="1" data-dir="1">+</button>
      </div>
     </div>
    </div>
    <div class="rotor">
     <button class="rotor-btn up" data-rotor="2">&#9650;</button>
     <div class="rotor-housing">
      <div class="rotor-window" id="rotor-2">A</div>
     </div>
     <button class="rotor-btn down" data-rotor="2">&#9660;</button>
     <div class="rotor-label">Right</div>
     <div class="ring-section">
      <div class="ring-label">Ring</div>
      <div class="ring-controls">
       <button class="ring-btn" data-rotor="2" data-dir="-1">&#8722;</button>
       <div class="ring-display" id="ring-2">A</div>
       <button class="ring-btn" data-rotor="2" data-dir="1">+</button>
      </div>
     </div>
    </div>
   </div>

   <!-- Lampboard -->
   <div class="lampboard">
    <div class="lamp-row">
     <div class="lamp" id="lamp-Q">Q</div>
     <div class="lamp" id="lamp-W">W</div>
     <div class="lamp" id="lamp-E">E</div>
     <div class="lamp" id="lamp-R">R</div>
     <div class="lamp" id="lamp-T">T</div>
     <div class="lamp" id="lamp-Z">Z</div>
     <div class="lamp" id="lamp-U">U</div>
     <div class="lamp" id="lamp-I">I</div>
     <div class="lamp" id="lamp-O">O</div>
    </div>
    <div class="lamp-row">
     <div class="lamp" id="lamp-A">A</div>
     <div class="lamp" id="lamp-S">S</div>
     <div class="lamp" id="lamp-D">D</div>
     <div class="lamp" id="lamp-F">F</div>
     <div class="lamp" id="lamp-G">G</div>
     <div class="lamp" id="lamp-H">H</div>
     <div class="lamp" id="lamp-J">J</div>
     <div class="lamp" id="lamp-K">K</div>
    </div>
    <div class="lamp-row">
     <div class="lamp" id="lamp-P">P</div>
     <div class="lamp" id="lamp-Y">Y</div>
     <div class="lamp" id="lamp-X">X</div>
     <div class="lamp" id="lamp-C">C</div>
     <div class="lamp" id="lamp-V">V</div>
     <div class="lamp" id="lamp-B">B</div>
     <div class="lamp" id="lamp-N">N</div>
     <div class="lamp" id="lamp-M">M</div>
     <div class="lamp" id="lamp-L">L</div>
    </div>
   </div>

   <!-- Keyboard -->
   <div class="keyboard">
    <div class="key-row">
     <div class="key" data-key="Q">Q</div>
     <div class="key" data-key="W">W</div>
     <div class="key" data-key="E">E</div>
     <div class="key" data-key="R">R</div>
     <div class="key" data-key="T">T</div>
     <div class="key" data-key="Z">Z</div>
     <div class="key" data-key="U">U</div>
     <div class="key" data-key="I">I</div>
     <div class="key" data-key="O">O</div>
    </div>
    <div class="key-row">
     <div class="key" data-key="A">A</div>
     <div class="key" data-key="S">S</div>
     <div class="key" data-key="D">D</div>
     <div class="key" data-key="F">F</div>
     <div class="key" data-key="G">G</div>
     <div class="key" data-key="H">H</div>
     <div class="key" data-key="J">J</div>
     <div class="key" data-key="K">K</div>
    </div>
    <div class="key-row">
     <div class="key" data-key="P">P</div>
     <div class="key" data-key="Y">Y</div>
     <div class="key" data-key="X">X</div>
     <div class="key" data-key="C">C</div>
     <div class="key" data-key="V">V</div>
     <div class="key" data-key="B">B</div>
     <div class="key" data-key="N">N</div>
     <div class="key" data-key="M">M</div>
     <div class="key" data-key="L">L</div>
    </div>
   </div>

   </div>
  </div>

  <!-- Paper notepad beside the machine -->
  <div class="paper">
   <div class="paper-heading">Output</div>
   <div class="paper-text" id="output-tape"></div>
  </div>

 </div>

 <script src="enigma.js"></script>
 <script src="ui.js"></script>
</body>
</html>
